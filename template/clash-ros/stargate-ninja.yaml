# QUIC test
- DOMAIN-REGEX,.*nginx.org,AntiMAX
# Telegram
- RULE-SET,geoip-telegram,AntiMAX
#,no-resolve
- RULE-SET,telegram,AntiMAX

# Whatsapp
- RULE-SET,whatsapp,AntiMAX
- RULE-SET,meta,AntiMAX

# Social Networks
- AND,((NETWORK,UDP),(RULE-SET,geoip-discord)),⌇ Social Networks
- AND,((NETWORK,UDP),(RULE-SET,discord)),⌇ Social Networks

- RULE-SET,geoip-discord,⌇ Social Networks
#,no-resolve
- RULE-SET,notion,⌇ Social Networks
- RULE-SET,discord,⌇ Social Networks
- RULE-SET,twitter,⌇ Social Networks
