- DOMAIN-REGEX,.*2ip.*.io,⁖ Automatic

# Private
- RULE-SET,geoip-private,Direct
#,no-resolve
- RULE-SET,private,Direct
- DOMAIN-REGEX,.*syng.*,Direct
