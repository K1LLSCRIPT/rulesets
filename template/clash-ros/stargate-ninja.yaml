- DOMAIN-REGEX,.*zbs.*.ninja,Direct
- DOMAIN-REGEX,.*grandtrade.*,Direct
- DOMAIN-REGEX,.*vlessvova.*.ru,Direct
- DOMAIN-REGEX,.*dynamo.*.vision,Direct
- DOMAIN-REGEX,.*beardman.*.trade,Direct

## QUIC
- AND,((NETWORK,udp),(DST-PORT,443)),QUIC
#- AND,((NETWORK,UDP),(DST-PORT,443)),REJECT

# STUN
- AND,((NETWORK,UDP),(RULE-SET,microsoft)),⌇ Microsoft

- AND,((NETWORK,UDP),(DOMAIN-REGEX,.*signaler.*)),AntiMAX
- AND,((NETWORK,UDP),(DOMAIN-REGEX,.*stun.*)),AntiMAX
#- AND,((NETWORK,UDP),(RULE-SET,geoip-google)),AntiMAX
#- AND,((NETWORK,UDP),(RULE-SET,google)),AntiMAX

- AND,((NETWORK,UDP),(RULE-SET,geoip-telegram)),AntiMAX
- AND,((NETWORK,UDP),(RULE-SET,telegram)),AntiMAX
- AND,((NETWORK,UDP),(RULE-SET,geoip-whatsapp)),AntiMAX
- AND,((NETWORK,UDP),(RULE-SET,whatsapp)),AntiMAX
- AND,((NETWORK,UDP),(RULE-SET,meta)),AntiMAX

- OR,((RULE-SET,telegram-domains),(RULE-SET,telegram-ips)),AntiMAX
- OR,((RULE-SET,whatsapp-domains),(RULE-SET,whatsapp-ips)),AntiMAX
- OR,((RULE-SET,discord-domains),(RULE-SET,discord-voiceips)),AntiMAX

- OR,((DST-PORT,596-599),(DST-PORT,1400),(DST-PORT,3478-3480),(DST-PORT,4379-4380),(DST-PORT,5222),(DST-PORT,5223),(DST-PORT,5228),(DST-PORT,5242),(DST-PORT,6250),(DST-PORT,12000-65535),(DST-PORT,27101-65535),(DST-PORT,45395),(DST-PORT,50318),(DST-PORT,59234)),⌇ Voice Ports

