mode: Rule
port: 7890
profile: {store-selected: true}
unified-delay: true
allow-lan: true
log-level: $LOG_LEVEL
ipv6: $IPV6
external-controller: $EXTERNAL_CONTROLLER_ADDRESS:$UI_PORT
external-ui: $EXTERNAL_UI_PATH
external-ui-url: $EXTERNAL_UI_URL
secret: $UI_SECRET

sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

dns:
  enable: $DNS_ENABLE
  prefer-h3: false
  use-system-hosts: $DNS_USE_SYSTEM_HOSTS
  respect-rules: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: ${FAKE_IP_RANGE}
  fake-ip-filter:
  - "*.lan"
  - "*.localdomain"
  - "*.local"
  - "*.example"
  - "*.invalid"
  - "*.localhost"
  - "*.test"
  - "*.home.arpa"
  - "*.direct"
  - cable.auth.com
  - network-test.debian.org
  - detectportal.firefox.com
  - resolver1.opendns.com
  - time.*.com
  - time.*.gov
  - time1.*.com
  - time2.*.com
  - time3.*.com
  - time4.*.com
  - time5.*.com
  - time6.*.com
  - time7.*.com
  - ntp.*.com
  - ntp1.*.com
  - ntp2.*.com
  - ntp3.*.com
  - ntp4.*.com
  - ntp5.*.com
  - ntp6.*.com
  - ntp7.*.com
  - "+.pool.ntp.org"
  - proxy.golang.org
  - "+.pub.3gppnetwork.org"
  - "+.bftcom.com"
  - "+.noytech.com"
  - "+.vlessvova.ru"
  - "+.zbs.ninja"
  - "+.darkvpn.net"
  - "+.icona.one"
  - "+.beardman.trade"
  - "+.dynamo.vision"
  default-nameserver:
  - https://8.8.8.8/dns-query#disable-ipv6=true
  proxy-server-nameserver:
  - https://8.8.8.8/dns-query#disable-ipv6=true
  nameserver:
  - https://dns.google/dns-query
  - https://cloudflare-dns.com/dns-query
  - https://dns.quad9.net/dns-query
hosts:
  dns.google: [8.8.8.8, 8.8.4.4]
  dns.quad9.net: [9.9.9.9, 149.112.112.112]
  cloudflare-dns.com: [104.16.248.249, 104.16.249.249]

listeners:
  - name: mixed-in
    type: mixed
    port: $MIXED_PORT
$TUN_IN_AUTOCONFIG

proxy-providers:
$PROVIDERS_BLOCK


proxy-anchor:
  uurl: &uurl {url: 'http://www.gstatic.com/generate_204'}
  uurltest: &uurltest {interval: 100, tolerance: 50, lazy: false}
  urltest:  &urltest  {type: url-test, <<: [*uurltest, *uurl]}
  select:   &select   {type: select,   <<: [*uurltest, *uurl]}
  balance:  &balance  {type: load-balance, <<: [*uurltest, *uurl], strategy: consistent-hashing}

  filter-rus: &filter-rus {filter: "(?i)🇷🇺"}
  filter-uae: &filter-uae {filter: "(?i)🇦🇪"}
  filter-wrp: &filter-wrp {filter: "(?i)🇳🇵"}
  filter-ruw: &filter-ruw {filter: "(?i)🇷🇺|🇳🇵"}
  filter-usa: &filter-usa {filter: "(?i)🇺🇸|🇳🇵"}
  filter-eur: &filter-eur {filter: "(?i)🇳🇱|🇨🇭|🇩🇪|🇱🇻|🇪🇪|"}
  filter-all: &filter-all {filter: "(?i)🇺🇸|🇳🇱|🇨🇭|🇩🇪|🇱🇻|🇪🇪|🇦🇪|🇳🇵"}
  proxies-di:  &proxies-di  {proxies: [Direct]}
  proxies-fb:  &proxies-fb  {proxies: [⁖ Automatic, Direct]}

#  proxies-ad:  &proxies-ad  {proxies: [⁖ Automatic, Direct, Europe, USA]}
#  proxies-adr: &proxies-adr {proxies: [⁖ Automatic, Direct, Europe, USA, Russia]}
#  proxies-dar: &proxies-dar {proxies: [Direct, ⁖ Automatic, Europe, USA, Russia]}

  proxies-ad:  &proxies-ad  {proxies: [⁖ Automatic, Direct, UAE, Europe, USA]}
  proxies-adr: &proxies-adr {proxies: [⁖ Automatic, Direct, UAE, Europe, USA, Russia]}
  proxies-dar: &proxies-dar {proxies: [Direct, ⁖ Automatic, UAE, Europe, USA, Russia]}

  icon-Automatic: &icon-Automatic {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Auto.png}
  icon-Fallback: &icon-Fallback {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Final.png}
  icon-AntiMAX: &icon-AntiMAX {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Rocket.png}
  icon-Russia: &icon-Russia {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Russia.png}
  icon-Europe: &icon-Europe {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/European_Union.png}
  icon-USA: &icon-USA {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/United_States.png}
  icon-UAE: &icon-UAE {icon: https://zbs.ninja/ibyfsk7c2dat/IconSet/United-Arab-Emirates.png}
  icon-Microsoft: &icon-Microsoft {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Microsoft.png}
  icon-Speedtest: &icon-Speedtest {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Speedtest.png}
  icon-Social: &icon-Social {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Discord.png}
  icon-Google: &icon-Google {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png}
  icon-YouTube: &icon-YouTube {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/YouTube.png}
  icon-Netflix: &icon-Netflix {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Netflix.png}
  icon-Stream: &icon-Stream {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Infuse.png}
  icon-Games: &icon-Games {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/PlayStation_1.png}
  icon-BattleNet: &icon-BattleNet {icon: https://zbs.ninja/ibyfsk7c2dat/IconSet/battlenet.png}
  icon-Stocks: &icon-Stocks {icon: https://zbs.ninja/ibyfsk7c2dat/IconSet/Bitcoin_Icon.png}
  icon-OpenAi: &icon-OpenAi {icon: https://zbs.ninja/ibyfsk7c2dat/IconSet/Ai.png}
  icon-FFFUUUUU: &icon-FFFUUUUU {icon: https://zbs.ninja/ibyfsk7c2dat/IconSet/FFFUUUUU.png}
  icon-AdBlock: &icon-AdBlock {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Pirate_Nation.png}
  icon-Direct: &icon-Direct {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png}
  icon-Block: &icon-Block {icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Reject.png}
  icon-Puzzle: &icon-Puzzle {icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Puzzle.png}

proxy-groups:
- {name: "Direct", <<: *icon-Direct, type: select, hidden: true, udp: true, proxies: [DIRECT]}
- {name: "Block",  <<: *icon-Block,  type: select, hidden: true, proxies: [REJECT]}
- {name: QUIC, type: select, proxies: [PASS, REJECT]}

- {name: "Moscow", <<: [*icon-Russia, *select, *filter-rus], hidden: true, include-all: true}

- {name: "⁖ Automatic", <<: [*icon-Automatic, *urltest, *filter-all], include-all: true}

- {name: "AntiMAX", <<: [*icon-AntiMAX, *urltest, *filter-all], include-all: true}
#- {name: "AntiMAX", <<: *icon-AntiMAX, <<: *urltest, include-all: true, <<: *filter-all}

- {name: "Russia", <<: [*icon-Russia, *select,  *filter-rus], include-all: true, proxies: [Direct]}
#- {name: "Russia", <<: *icon-Russia, <<: *select,  include-all: true, <<: *filter-rus, proxies: [Direct]}
- {name: "Europe", <<: [*icon-Europe, *balance, *filter-eur], include-all: true}
- {name: "USA",    <<: [*icon-USA,    *balance, *filter-usa], include-all: true}

#- {name: "🇪🇺 Auto", hidden: true, <<: *balance, <<: *filter-eur}
#- {name: "Europe", <<: *icon-Europe, proxies: [🇪🇺 Auto], <<: *select, <<: *filter-eur}
#- {name: "🇺🇸 Auto", hidden: true, <<: *balance, <<: *filter-usa}
#- {name: "USA", <<: *icon-USA, proxies: [🇺🇸 Auto], <<: *select, <<: *filter-usa}
- {name: "UAE", <<: [*icon-UAE, *select, *filter-uae], include-all: true}

#- {name: "⌇ Speedtest", <<: *icon-Speedtest, <<: *select, <<: *proxies-ad, include-all: true, <<: *filter-wrp}
- {name: "⌇ Microsoft", <<: [*icon-Microsoft, *select,  *proxies-dar], include-all: true}
- {name: "⌇ Speedtest", <<: [*icon-Speedtest, *select,  *proxies-ad, *filter-spd], include-all: true}
- {name: "⌇ Social Networks", <<: [*icon-Social, *select, *proxies-adr, *filter-wrp],include-all: true}
- {name: "⌇ Google", <<: [*icon-Google, *select, *proxies-adr, *filter-ruw], include-all: true}
- {name: "⌇ YouTube", <<: [*icon-YouTube, *select, *proxies-adr, *filter-ruw], include-all: true}
- {name: "⌇ Netflix", <<: [*icon-Netflix, *select, *proxies-ad, *filter-wrp], include-all: true}
- {name: "⌇ Stream", <<: [*icon-Stream, *select, *proxies-dar, *filter-ruw], include-all-proxies: true}
- {name: "⌇ Games", <<: [*icon-Games, *select, *proxies-dar, *filter-ruw], include-all: true}
- {name: "⌇ Battle.net", <<: [*icon-BattleNet, *select, *proxies-dar, *filter-ruw], include-all: true}
- {name: "⌇ Voice Ports", <<: [*icon-Puzzle, *select, *proxies-dar, *filter-ruw], include-all: true}
- {name: "⌇ Stocks", <<: [*icon-Stocks, *select, *proxies-dar, *filter-ruw], include-all: true}
- {name: "⌇ OpenAi", <<: [*icon-OpenAi, *select, *proxies-ad, *filter-wrp], include-all: true}
- {name: "⌇ FFFUUUUU", <<: [*icon-FFFUUUUU, *select, *proxies-adr, *filter-ruw], include-all: true}

- {name: "⠆ AdBlock", <<: *icon-AdBlock, type: select, proxies: [Block, ⁖ Automatic, Direct]}

- {name: "GLOBAL", type: select, udp: true, include-all: true, exclude-filter: "(?i)Direct|Reject", proxies: [⁖ Automatic]}
- {name: "⠇ Fallback", <<: [*icon-Fallback, *proxies-fb], type: fallback}

rule-universal-definition:
  universal-config: &universal {type: http, interval: 86400}

  domain: &domain {behavior: domain, format: yaml, <<: *universal}
  domain_mrs: &domain_mrs {behavior: domain, format: mrs, <<: *universal}
  ipcidr: &ipcidr {behavior: ipcidr, format: yaml, <<: *universal}
  classical: &classical {behavior: classical, format: yaml, <<: *universal}
  yaml: &yaml {behavior: domain, format: yaml, <<: *universal}

